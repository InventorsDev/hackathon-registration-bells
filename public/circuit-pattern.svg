<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
    <pattern id="circuit" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#grid)"/>
      <circle cx="50" cy="50" r="3" fill="none" stroke="#0f0" stroke-width="0.5"/>
      <circle cx="50" cy="50" r="6" fill="none" stroke="#0f0" stroke-width="0.5" stroke-dasharray="1,1"/>
      <path d="M 50 50 L 70 50 L 70 70" fill="none" stroke="#0f0" stroke-width="0.5"/>
      <path d="M 50 50 L 30 50 L 30 30" fill="none" stroke="#0f0" stroke-width="0.5"/>
      <path d="M 50 50 L 50 30 L 70 30" fill="none" stroke="#0f0" stroke-width="0.5"/>
      <path d="M 50 50 L 50 70 L 30 70" fill="none" stroke="#0f0" stroke-width="0.5"/>
      <circle cx="70" cy="70" r="2" fill="#0f0" fill-opacity="0.3"/>
      <circle cx="30" cy="30" r="2" fill="#0f0" fill-opacity="0.3"/>
      <circle cx="70" cy="30" r="2" fill="#0f0" fill-opacity="0.3"/>
      <circle cx="30" cy="70" r="2" fill="#0f0" fill-opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#circuit)"/>
</svg> 